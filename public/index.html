<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aura | Ultra Premium Weather</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #050505;
            color: #ffffff;
            min-height: 100dvh;
            margin: 0;
            overflow-x: hidden;
            padding-bottom: 2rem;
        }
        .ambient-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            transition: background 2s ease-in-out;
        }
        .orb-1 { top: -20%; left: -10%; width: 70vw; height: 70vw; background: rgba(56, 189, 248, 0.12); }
        .orb-2 { bottom: -20%; right: -10%; width: 60vw; height: 60vw; background: rgba(139, 92, 246, 0.12); }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        
        input::placeholder { color: rgba(255,255,255,0.3); }
        .hide-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="w-full flex flex-col items-center pt-8 px-4 relative">

    <div class="ambient-orb orb-1" id="bg-orb-1"></div>
    <div class="ambient-orb orb-2" id="bg-orb-2"></div>

    <div class="w-full max-w-md relative z-50 mb-8 ui-element">
        <div class="flex items-center gap-2">
            <div class="relative w-full flex items-center bg-white/5 border border-white/10 rounded-2xl focus-within:bg-white/10 focus-within:border-white/30 transition-all">
                <svg class="w-5 h-5 ml-4 text-white/40" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                <input type="text" id="cityInput" placeholder="Search location..." autocomplete="off" class="w-full bg-transparent px-3 py-3 outline-none text-base">
            </div>
            <button onclick="getExactLocation()" class="p-3 bg-white/10 hover:bg-white/20 border border-white/10 rounded-2xl transition-all flex-shrink-0">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
            </button>
        </div>
        <ul id="autocomplete-list" class="absolute top-full left-0 w-full mt-2 glass-panel rounded-2xl overflow-hidden opacity-0 pointer-events-none transition-opacity duration-300 max-h-56 overflow-y-auto hidden flex-col z-[100]"></ul>
    </div>

    <div class="w-full max-w-md flex flex-col gap-4 pb-10" id="dashboard">
        
        <div class="text-center mb-4 ui-element">
            <h1 id="cityName" class="text-3xl font-semibold tracking-wide text-white">Location</h1>
            <p id="subRegion" class="text-sm text-white/50 mb-4">--</p>
            <div class="text-8xl font-bold tracking-tighter mb-2" id="temperature">--°</div>
            <p id="condition" class="text-xl text-white/80 font-light mb-1">--</p>
            <p class="text-sm text-white/50"><span id="minMax">-- / --</span> <span class="mx-2">•</span> Feels like <span id="feelsLike">--°</span></p>
        </div>

        <div class="glass-panel rounded-3xl p-5 ui-element">
            <h3 class="text-xs text-white/50 uppercase tracking-widest mb-4">Hourly Forecast</h3>
            <div class="w-full h-32 relative">
                <canvas id="hourlyChart"></canvas>
            </div>
        </div>

        <div class="glass-panel rounded-3xl p-5 ui-element">
            <h3 class="text-xs text-white/50 uppercase tracking-widest mb-4">7-Day Forecast</h3>
            <div id="dailyForecast" class="flex flex-col gap-3">
                </div>
        </div>

        <div class="grid grid-cols-2 gap-4 ui-element">
            <div class="glass-panel rounded-3xl p-5">
                <p class="text-xs text-white/50 uppercase tracking-widest mb-2 flex items-center gap-2"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg> Wind</p>
                <p class="text-2xl font-semibold" id="windSpeed">--</p>
            </div>
            <div class="glass-panel rounded-3xl p-5">
                <p class="text-xs text-white/50 uppercase tracking-widest mb-2 flex items-center gap-2"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg> UV Index</p>
                <p class="text-2xl font-semibold" id="uvIndex">--</p>
            </div>
            <div class="glass-panel rounded-3xl p-5">
                <p class="text-xs text-white/50 uppercase tracking-widest mb-2">Humidity</p>
                <p class="text-2xl font-semibold" id="humidity">--%</p>
            </div>
            <div class="glass-panel rounded-3xl p-5">
                <p class="text-xs text-white/50 uppercase tracking-widest mb-2">Pressure</p>
                <p class="text-2xl font-semibold" id="pressure">-- hPa</p>
            </div>
        </div>

        <div class="glass-panel rounded-3xl p-5 ui-element">
            <h3 class="text-xs text-white/50 uppercase tracking-widest mb-2">Air Quality Index</h3>
            <div class="flex items-end gap-3 mb-4">
                <p class="text-4xl font-bold" id="aqiValue">--</p>
                <p class="text-lg text-white/60 mb-1" id="aqiStatus">--</p>
            </div>
            <div class="w-full h-1.5 bg-white/10 rounded-full overflow-hidden mb-4">
                <div id="aqiBar" class="h-full w-0 bg-gradient-to-r from-green-400 via-yellow-400 to-red-500 transition-all duration-1000"></div>
            </div>
            <div class="flex justify-between text-xs text-white/50 border-t border-white/10 pt-3">
                <div class="text-center"><p>PM2.5</p><p class="text-white font-medium" id="pm25">--</p></div>
                <div class="text-center"><p>PM10</p><p class="text-white font-medium" id="pm10">--</p></div>
                <div class="text-center"><p>SO2</p><p class="text-white font-medium" id="so2">--</p></div>
            </div>
        </div>
    </div>

    <script>
        // Setup Chart.js global defaults for dark theme
        Chart.defaults.color = 'rgba(255, 255, 255, 0.5)';
        Chart.defaults.font.family = "'Space Grotesk', sans-serif";
        let hourlyChartInstance = null;

        // Animations
        function animateUI() {
            gsap.fromTo(".ui-element", 
                { y: 30, opacity: 0 }, 
                { y: 0, opacity: 1, duration: 0.8, stagger: 0.1, ease: "power3.out" }
            );
        }

        function updateEnvironment(temp) {
            const orb1 = document.getElementById('bg-orb-1');
            const orb2 = document.getElementById('bg-orb-2');
            if (temp <= 15) { 
                orb1.style.background = 'rgba(56, 189, 248, 0.12)'; orb2.style.background = 'rgba(59, 130, 246, 0.12)';
            } else if (temp > 15 && temp <= 28) { 
                orb1.style.background = 'rgba(167, 139, 250, 0.12)'; orb2.style.background = 'rgba(236, 72, 153, 0.12)';
            } else { 
                orb1.style.background = 'rgba(251, 146, 60, 0.12)'; orb2.style.background = 'rgba(239, 68, 68, 0.12)';
            }
        }

        // --- Core Fetching Logic ---
        async function fetchFullDashboard(lat, lon, primaryName, subRegion = "") {
            document.getElementById('cityName').innerText = primaryName || "Locating...";
            document.getElementById('subRegion').innerText = subRegion;
            
            try {
                // 1. Fetch Comprehensive Weather
                const weatherURL = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,is_day,surface_pressure,wind_speed_10m&hourly=temperature_2m&daily=temperature_2m_max,temperature_2m_min,uv_index_max&timezone=auto`;
                
                // 2. Fetch Air Quality
                const aqiURL = `https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lon}&current=european_aqi,pm10,pm2_5,sulphur_dioxide&timezone=auto`;

                const [weatherRes, aqiRes] = await Promise.all([fetch(weatherURL), fetch(aqiURL)]);
                const weatherData = await weatherRes.json();
                const aqiData = await aqiRes.json();

                // Update Hero
                const current = weatherData.current;
                const daily = weatherData.daily;
                document.getElementById('temperature').innerText = `${Math.round(current.temperature_2m)}°`;
                document.getElementById('condition').innerText = current.is_day === 1 ? "Clear / Sunny" : "Clear Night";
                document.getElementById('feelsLike').innerText = `${Math.round(current.apparent_temperature)}°`;
                document.getElementById('minMax').innerText = `${Math.round(daily.temperature_2m_min[0])}° ~ ${Math.round(daily.temperature_2m_max[0])}°`;

                // Update Details Grid
                document.getElementById('windSpeed').innerText = `${current.wind_speed_10m} km/h`;
                document.getElementById('humidity').innerText = `${current.relative_humidity_2m}%`;
                document.getElementById('pressure').innerText = `${current.surface_pressure} hPa`;
                document.getElementById('uvIndex').innerText = daily.uv_index_max[0] ? daily.uv_index_max[0].toFixed(1) : "--";

                // Update AQI
                if(aqiData.current) {
                    const aqi = aqiData.current.european_aqi;
                    document.getElementById('aqiValue').innerText = aqi;
                    document.getElementById('pm25').innerText = aqiData.current.pm2_5;
                    document.getElementById('pm10').innerText = aqiData.current.pm10;
                    document.getElementById('so2').innerText = aqiData.current.sulphur_dioxide;
                    
                    let status = "Good"; let pct = (aqi / 100) * 100;
                    if(aqi > 50) status = "Moderate";
                    if(aqi > 100) status = "Unhealthy";
                    document.getElementById('aqiStatus').innerText = status;
                    document.getElementById('aqiBar').style.width = `${Math.min(pct, 100)}%`;
                }

                // Render Hourly Chart (Next 12 hours)
                renderHourlyChart(weatherData.hourly.time.slice(0, 12), weatherData.hourly.temperature_2m.slice(0, 12));

                // Render Daily List
                renderDailyForecast(daily);

                updateEnvironment(current.temperature_2m);
                animateUI();

            } catch (error) {
                console.error("Dashboard Sync Failed", error);
            }
        }

        // --- Chart & List Renderers ---
        function renderHourlyChart(times, temps) {
            const ctx = document.getElementById('hourlyChart').getContext('2d');
            
            // Format time labels (e.g., "14:00")
            const labels = times.map(t => new Date(t).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}));

            if (hourlyChartInstance) hourlyChartInstance.destroy();

            hourlyChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        data: temps,
                        borderColor: '#ffffff',
                        backgroundColor: 'rgba(255, 255, 255, 0.1)',
                        borderWidth: 2,
                        tension: 0.4, // Smooth curves
                        fill: true,
                        pointRadius: 0, // Hide dots unless hovered
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false }, tooltip: { enabled: true } },
                    scales: {
                        x: { grid: { display: false }, ticks: { maxTicksLimit: 5 } },
                        y: { display: false } // Hide Y axis for clean look
                    }
                }
            });
        }

        function renderDailyForecast(daily) {
            const container = document.getElementById('dailyForecast');
            container.innerHTML = "";
            const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

            for (let i = 0; i < 7; i++) {
                const date = new Date(daily.time[i]);
                const dayName = i === 0 ? "Today" : i === 1 ? "Tomorrow" : days[date.getDay()];
                const min = Math.round(daily.temperature_2m_min[i]);
                const max = Math.round(daily.temperature_2m_max[i]);

                container.innerHTML += `
                    <div class="flex justify-between items-center text-sm py-1 border-b border-white/5 last:border-0">
                        <span class="w-20 text-white/80">${dayName}</span>
                        <div class="flex-1 px-4 flex items-center">
                            <div class="w-full h-1 bg-white/10 rounded-full overflow-hidden relative">
                                <div class="absolute h-full bg-white/50 rounded-full" style="left: 20%; right: 20%;"></div>
                            </div>
                        </div>
                        <span class="w-16 text-right font-medium">${min}° <span class="text-white/40 ml-1">${max}°</span></span>
                    </div>
                `;
            }
        }

        // --- Search & Autocomplete ---
        const input = document.getElementById('cityInput');
        const dropdown = document.getElementById('autocomplete-list');
        let timeoutId;

        input.addEventListener('input', (e) => {
            clearTimeout(timeoutId);
            const query = e.target.value.trim();
            if (query.length < 3) { hideDropdown(); return; }
            timeoutId = setTimeout(() => fetchAutocomplete(query), 400); 
        });

        async function fetchAutocomplete(query) {
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}&limit=5&addressdetails=1`);
                const data = await res.json();
                if (!data || data.length === 0) return;

                dropdown.innerHTML = ''; 
                data.forEach(place => {
                    const li = document.createElement('li');
                    const addr = place.address || {};
                    const primaryName = addr.village || addr.town || addr.city_district || addr.city || place.name;
                    const subInfo = [addr.state, addr.country].filter(Boolean).join(", ");

                    li.className = 'px-5 py-3 cursor-pointer hover:bg-white/10 transition-colors text-white border-b border-white/5 last:border-none text-left';
                    li.innerHTML = `<div class="font-medium text-sm">${primaryName}</div><div class="text-[10px] text-white/50 truncate mt-0.5">${subInfo}</div>`;
                    
                    li.onclick = () => {
                        input.value = primaryName;
                        hideDropdown();
                        fetchFullDashboard(place.lat, place.lon, primaryName, subInfo);
                    };
                    dropdown.appendChild(li);
                });
                dropdown.classList.remove('hidden');
                setTimeout(() => { dropdown.style.opacity = '1'; dropdown.style.pointerEvents = 'auto'; }, 10);
            } catch (error) { console.error(error); }
        }

        function hideDropdown() {
            dropdown.style.opacity = '0'; dropdown.style.pointerEvents = 'none';
            setTimeout(() => dropdown.classList.add('hidden'), 300);
        }

        // --- The Ultimate Fix: Exact Location Button ---
        function getExactLocation() {
            if (navigator.geolocation) {
                input.value = "Locating...";
                navigator.geolocation.getCurrentPosition(
                    async (position) => {
                        try {
                            const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${position.coords.latitude}&lon=${position.coords.longitude}&addressdetails=1`);
                            const data = await res.json();
                            const addr = data.address || {};
                            const primaryName = addr.village || addr.town || addr.suburb || addr.city || "Current Location";
                            const subInfo = [addr.state, addr.country].filter(Boolean).join(", ");
                            
                            input.value = primaryName;
                            fetchFullDashboard(position.coords.latitude, position.coords.longitude, primaryName, subInfo);
                        } catch {
                            fetchFullDashboard(position.coords.latitude, position.coords.longitude, "Your Coordinates");
                        }
                    },
                    (error) => alert("GPS access denied or timed out."),
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            }
        }

        // Boot
        window.onload = () => {
            fetchFullDashboard(22.5726, 88.3639, "Kolkata", "West Bengal, India"); // Default
        };
    </script>
</body>
</html>
