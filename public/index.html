<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aura | Ultra Premium Weather</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #030508;
            color: #ffffff;
            min-height: 100dvh;
            margin: 0;
            overflow-x: hidden;
            padding-bottom: 2rem;
        }
        
        /* Dynamic Ambient Orbs */
        .ambient-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -1;
            transition: background 2.5s ease-in-out;
        }
        .orb-1 { top: -20%; left: -10%; width: 70vw; height: 70vw; background: rgba(56, 189, 248, 0.1); }
        .orb-2 { bottom: -20%; right: -10%; width: 60vw; height: 60vw; background: rgba(139, 92, 246, 0.1); }
        
        /* Weather FX Layer */
        #weather-fx { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
        
        /* Glassmorphism */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        /* Custom Scrollbars */
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        input::placeholder { color: rgba(255,255,255,0.3); }

        /* FX Animations */
        @keyframes fall { to { transform: translateY(110vh); } }
        @keyframes twinkle { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; transform: scale(1.2); } }
        @keyframes drift { from { transform: translateX(-20vw); } to { transform: translateX(120vw); } }
        
        .rain-drop { position: absolute; background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0.4)); width: 1.5px; height: 35px; animation: fall linear infinite; }
        .snow-flake { position: absolute; background: #fff; border-radius: 50%; animation: fall linear infinite; box-shadow: 0 0 10px #fff; }
        .star { position: absolute; background: #fff; border-radius: 50%; animation: twinkle ease-in-out infinite; box-shadow: 0 0 5px #fff; }
        .cloud { position: absolute; background: rgba(255,255,255,0.05); border-radius: 50%; filter: blur(40px); animation: drift linear infinite; }
    </style>
</head>
<body class="w-full flex flex-col items-center pt-8 px-4 relative">

    <div id="weather-fx"></div>
    <div class="ambient-orb orb-1" id="bg-orb-1"></div>
    <div class="ambient-orb orb-2" id="bg-orb-2"></div>

    <div class="w-full max-w-md relative z-50 mb-6 ui-element">
        <div class="flex items-center gap-2">
            <div class="relative w-full flex items-center bg-white/5 border border-white/10 rounded-2xl focus-within:bg-white/10 focus-within:border-white/30 transition-all">
                <svg class="w-5 h-5 ml-4 text-white/40" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                <input type="text" id="cityInput" placeholder="Enter village, tap GPS ➔" autocomplete="off" class="w-full bg-transparent px-3 py-3 outline-none text-base">
            </div>
            <button onclick="getExactLocation()" class="p-3 bg-white/10 hover:bg-white/20 border border-white/10 rounded-2xl transition-all flex-shrink-0 active:scale-95">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
            </button>
        </div>
        <ul id="autocomplete-list" class="absolute top-full left-0 w-full mt-2 glass-panel rounded-2xl overflow-hidden opacity-0 pointer-events-none transition-opacity duration-300 max-h-56 overflow-y-auto hidden flex-col z-[100]"></ul>
    </div>

    <div class="w-full max-w-md flex flex-col gap-4 pb-10 relative z-10" id="dashboard">
        
        <div class="text-center mb-2 ui-element">
            <h1 id="cityName" class="text-3xl font-semibold tracking-wide text-white capitalize">Syncing...</h1>
            <p id="subRegion" class="text-sm text-white/50 mb-4">--</p>
            <div class="text-8xl font-bold tracking-tighter mb-2" id="temperature">--°</div>
            <p id="condition" class="text-xl text-white/80 font-medium mb-1">--</p>
            <p class="text-sm text-white/50"><span id="minMax">-- / --</span> <span class="mx-2">•</span> Feels like <span id="feelsLike">--°</span></p>
        </div>

        <div class="glass-panel rounded-3xl p-5 ui-element">
            <h3 class="text-xs text-white/50 uppercase tracking-widest mb-4 flex justify-between">
                <span>24-Hour Forecast</span>
                <span class="text-[10px] bg-white/10 px-2 py-0.5 rounded-full flex items-center gap-1">Swipe <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg></span>
            </h3>
            <div id="hourlyContainer" class="flex gap-3 overflow-x-auto hide-scroll pb-2 w-full snap-x">
                </div>
        </div>

        <div class="glass-panel rounded-3xl p-5 ui-element">
            <h3 class="text-xs text-white/50 uppercase tracking-widest mb-4">7-Day Forecast</h3>
            <div id="dailyForecast" class="flex flex-col gap-3"></div>
        </div>

        <div class="grid grid-cols-2 gap-3 ui-element">
            <div class="glass-panel rounded-[1.5rem] p-4 flex flex-col items-center text-center">
                <p class="text-[11px] text-white/50 uppercase tracking-widest mb-1">Wind</p>
                <p class="text-lg font-semibold" id="windSpeed">--</p>
            </div>
            <div class="glass-panel rounded-[1.5rem] p-4 flex flex-col items-center text-center">
                <p class="text-[11px] text-white/50 uppercase tracking-widest mb-1">Humidity</p>
                <p class="text-lg font-semibold" id="humidity">--%</p>
            </div>
            <div class="glass-panel rounded-[1.5rem] p-4 flex flex-col items-center text-center">
                <p class="text-[11px] text-white/50 uppercase tracking-widest mb-1">UV Index</p>
                <p class="text-lg font-semibold" id="uvIndex">--</p>
            </div>
            <div class="glass-panel rounded-[1.5rem] p-4 flex flex-col items-center text-center">
                <p class="text-[11px] text-white/50 uppercase tracking-widest mb-1">Visibility</p>
                <p class="text-lg font-semibold" id="visibility">-- km</p>
            </div>
            <div class="glass-panel rounded-[1.5rem] p-4 flex flex-col items-center text-center col-span-2">
                <p class="text-[11px] text-white/50 uppercase tracking-widest mb-1">Pressure</p>
                <p class="text-lg font-semibold" id="pressure">-- hPa</p>
            </div>
        </div>

        <div class="glass-panel rounded-3xl p-5 ui-element">
            <h3 class="text-xs text-white/50 uppercase tracking-widest mb-4">Sun & Moon</h3>
            <div class="relative w-full h-16 overflow-hidden mt-6 mb-2">
                <div class="absolute w-[90%] left-[5%] h-32 border-t-2 border-dashed border-white/30 rounded-full top-0"></div>
                <div class="absolute top-[-10px] left-1/2 -translate-x-1/2 text-xl drop-shadow-[0_0_10px_rgba(250,204,21,0.8)]">☀️</div>
                <div class="absolute bottom-0 w-full flex justify-between text-sm font-medium px-2">
                    <div class="flex flex-col"><span class="text-xl mb-1">🌅</span><span id="sunriseTime">--:--</span></div>
                    <div class="flex flex-col items-end"><span class="text-xl mb-1">🌇</span><span id="sunsetTime">--:--</span></div>
                </div>
            </div>
        </div>
        
    </div>

    <script>
        // --- Dynamic Weather Engine 💀 ---
        function getWeatherEmoji(code, isDay) {
            const map = {
                0: isDay ? '☀️' : '🌕', 
                1: isDay ? '🌤️' : '☁️', 2: '⛅', 3: '☁️',
                45: '🌫️', 48: '🌫️',
                51: '🌦️', 53: '🌦️', 55: '🌧️',
                61: '🌧️', 63: '🌧️', 65: '🌧️',
                71: '🌨️', 73: '❄️', 75: '❄️',
                80: '🌦️', 81: '🌧️', 82: '⛈️',
                95: '⛈️', 96: '⛈️', 99: '⛈️'
            };
            return map[code] || (isDay ? '☀️' : '🌙');
        }

        function triggerWeatherFX(code, isDay) {
            const fxContainer = document.getElementById('weather-fx');
            fxContainer.innerHTML = ''; // Clear old fx
            
            // Background color shifting
            updateEnvironment(code, isDay);

            let particles = 0;
            let type = '';

            // Rain (Codes 51-67, 80-82)
            if ([51,53,55,61,63,65,66,67,80,81,82].includes(code)) {
                particles = 60; type = 'rain';
            } 
            // Snow (Codes 71-77, 85-86)
            else if ([71,73,75,77,85,86].includes(code)) {
                particles = 40; type = 'snow';
            }
            // Clear Night Stars
            else if (code === 0 && !isDay) {
                particles = 30; type = 'star';
            }
            // Clouds
            else if ([2,3,45,48].includes(code)) {
                particles = 5; type = 'cloud';
            }

            for(let i=0; i<particles; i++) {
                let el = document.createElement('div');
                el.className = type === 'rain' ? 'rain-drop' : type === 'snow' ? 'snow-flake' : type === 'star' ? 'star' : 'cloud';
                
                if(type === 'rain') {
                    el.style.left = `${Math.random() * 100}vw`;
                    el.style.top = `-${Math.random() * 20}vh`;
                    el.style.animationDuration = `${0.5 + Math.random() * 0.3}s`;
                    el.style.animationDelay = `${Math.random()}s`;
                } else if(type === 'snow' || type === 'star') {
                    el.style.left = `${Math.random() * 100}vw`;
                    el.style.top = type === 'snow' ? `-${Math.random() * 20}vh` : `${Math.random() * 100}vh`;
                    let size = Math.random() * (type==='snow'?4:3) + 1;
                    el.style.width = `${size}px`;
                    el.style.height = `${size}px`;
                    el.style.animationDuration = type==='snow' ? `${3 + Math.random() * 3}s` : `${2 + Math.random() * 4}s`;
                    el.style.animationDelay = `${Math.random() * 2}s`;
                } else if(type === 'cloud') {
                    el.style.top = `${Math.random() * 30}vh`;
                    el.style.width = `${200 + Math.random() * 300}px`;
                    el.style.height = `${100 + Math.random() * 150}px`;
                    el.style.animationDuration = `${40 + Math.random() * 40}s`;
                    el.style.animationDelay = `-${Math.random() * 40}s`;
                }
                fxContainer.appendChild(el);
            }
        }

        function updateEnvironment(code, isDay) {
            const orb1 = document.getElementById('bg-orb-1');
            const orb2 = document.getElementById('bg-orb-2');
            
            if (!isDay && code <= 3) { // Clear/Partly Cloudy Night
                orb1.style.background = 'rgba(30, 58, 138, 0.15)'; // Deep blue
                orb2.style.background = 'rgba(88, 28, 135, 0.15)'; // Deep purple
            } else if (code >= 50) { // Rain/Storm/Snow
                orb1.style.background = 'rgba(71, 85, 105, 0.2)'; // Gray
                orb2.style.background = 'rgba(100, 116, 139, 0.2)'; 
            } else { // Clear Day
                orb1.style.background = 'rgba(56, 189, 248, 0.15)'; 
                orb2.style.background = 'rgba(236, 72, 153, 0.12)'; 
            }
        }

        function animateUI() {
            gsap.fromTo(".ui-element", { y: 20, opacity: 0 }, { y: 0, opacity: 1, duration: 0.6, stagger: 0.1, ease: "power2.out" });
        }

        // --- Data Fetching ---
        async function fetchFullDashboard(lat, lon, primaryName, subRegion = "") {
            document.getElementById('cityName').innerText = primaryName || "Locating...";
            document.getElementById('subRegion').innerText = subRegion;
            
            try {
                // Expanded URL to include visibility, weather codes, and sunrise/sunset
                const weatherURL = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,is_day,surface_pressure,wind_speed_10m,weather_code,visibility&hourly=temperature_2m,weather_code&daily=temperature_2m_max,temperature_2m_min,uv_index_max,sunrise,sunset&timezone=auto`;

                const weatherRes = await fetch(weatherURL);
                const weatherData = await weatherRes.json();

                const current = weatherData.current;
                const daily = weatherData.daily;
                
                // Update Hero
                document.getElementById('temperature').innerText = `${Math.round(current.temperature_2m)}°`;
                document.getElementById('condition').innerText = getWeatherEmoji(current.weather_code, current.is_day) + " " + (current.is_day === 1 ? "Daytime" : "Night");
                document.getElementById('feelsLike').innerText = `${Math.round(current.apparent_temperature)}°`;
                document.getElementById('minMax').innerText = `${Math.round(daily.temperature_2m_min[0])}° ~ ${Math.round(daily.temperature_2m_max[0])}°`;

                // Update Grid (Matches your screenshot exactly now)
                document.getElementById('windSpeed').innerText = `${current.wind_speed_10m} km/h`;
                document.getElementById('humidity').innerText = `${current.relative_humidity_2m}%`;
                document.getElementById('pressure').innerText = `${current.surface_pressure} hPa`;
                document.getElementById('uvIndex').innerText = daily.uv_index_max[0] ? daily.uv_index_max[0].toFixed(1) : "--";
                document.getElementById('visibility').innerText = current.visibility ? `${(current.visibility / 1000).toFixed(1)} km` : "--";

                // Update Sunrise / Sunset
                const rise = new Date(daily.sunrise[0]);
                const set = new Date(daily.sunset[0]);
                document.getElementById('sunriseTime').innerText = rise.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                document.getElementById('sunsetTime').innerText = set.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

                // Render Native Swipeable Hourly List
                renderSwipeableHourly(weatherData.hourly.time.slice(0, 24), weatherData.hourly.temperature_2m.slice(0, 24), weatherData.hourly.weather_code.slice(0, 24));
                
                // Render Daily
                renderDailyForecast(daily);
                
                // Trigger FX
                triggerWeatherFX(current.weather_code, current.is_day);
                animateUI();

            } catch (error) {
                console.error("Dashboard Sync Failed", error);
            }
        }

        // --- Native Swipeable 24h List (No more squished Chart.js) ---
        function renderSwipeableHourly(times, temps, codes) {
            const container = document.getElementById('hourlyContainer');
            container.innerHTML = "";

            for (let i = 0; i < 24; i++) {
                const date = new Date(times[i]);
                let hours = date.getHours();
                const ampm = hours >= 12 ? 'PM' : 'AM';
                hours = hours % 12 || 12;
                const timeStr = i === 0 ? 'Now' : `${hours} ${ampm}`;
                
                // Determine if this specific hour is daytime for the emoji
                const isDayHour = date.getHours() >= 6 && date.getHours() <= 18; 
                const emoji = getWeatherEmoji(codes[i], isDayHour);

                // Create sleek card
                container.innerHTML += `
                    <div class="flex flex-col items-center justify-between min-w-[4.5rem] p-3 rounded-2xl bg-white/5 border border-white/10 shrink-0 snap-start">
                        <span class="text-xs text-white/60">${timeStr}</span>
                        <span class="text-2xl my-2 drop-shadow-md">${emoji}</span>
                        <span class="text-lg font-semibold">${Math.round(temps[i])}°</span>
                    </div>
                `;
            }
        }

        function renderDailyForecast(daily) {
            const container = document.getElementById('dailyForecast');
            container.innerHTML = "";
            const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

            for (let i = 0; i < 7; i++) {
                const date = new Date(daily.time[i]);
                const dayName = i === 0 ? "Today" : i === 1 ? "Tomorrow" : days[date.getDay()];
                const min = Math.round(daily.temperature_2m_min[i]);
                const max = Math.round(daily.temperature_2m_max[i]);

                container.innerHTML += `
                    <div class="flex justify-between items-center text-sm py-2 border-b border-white/5 last:border-0">
                        <span class="w-20 text-white/80">${dayName}</span>
                        <div class="flex-1 px-4 flex items-center">
                            <div class="w-full h-1.5 bg-white/5 rounded-full overflow-hidden relative">
                                <div class="absolute h-full bg-gradient-to-r from-blue-400 to-yellow-400 rounded-full" style="left: 10%; right: 10%;"></div>
                            </div>
                        </div>
                        <span class="w-16 text-right font-medium">${min}° <span class="text-white/40 ml-1">${max}°</span></span>
                    </div>
                `;
            }
        }

        // --- Autocomplete ---
        const input = document.getElementById('cityInput');
        const dropdown = document.getElementById('autocomplete-list');
        let timeoutId;

        input.addEventListener('input', (e) => {
            clearTimeout(timeoutId);
            const query = e.target.value.trim();
            if (query.length < 3) { hideDropdown(); return; }
            timeoutId = setTimeout(() => fetchAutocomplete(query), 400); 
        });

        async function fetchAutocomplete(query) {
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}&limit=5&addressdetails=1`);
                const data = await res.json();
                if (!data || data.length === 0) return;

                dropdown.innerHTML = ''; 
                data.forEach(place => {
                    const li = document.createElement('li');
                    const addr = place.address || {};
                    const primaryName = addr.village || addr.town || addr.city_district || addr.city || place.name;
                    const subInfo = [addr.state, addr.coun
